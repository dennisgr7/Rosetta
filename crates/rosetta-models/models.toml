id = "parakeet-tdt-0.6b-v3"
kind = "asr"
license = "CC-BY-4.0"
[[model.file]]
name = "nemo128.onnx"
url = "https://huggingface.co/istupakov/parakeet-tdt-0.6b-v3-onnx/resolve/main/nemo128.onnx"
sha256 = "a9fde1486ebfcc08f328d75ad4610c67835fea58c73ba57e3209a6f6cf019e9f"
