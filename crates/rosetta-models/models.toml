# Catálogo de modelos de Rosetta.
#
# Cada [[model]] agrupa uno o más [[model.file]]. Un archivo se obtiene por:
#   - `url`                       -> descarga directa, o
#   - `archive_url` + `archive_member` -> descarga un .tar.bz2 y extrae un miembro.
# `sha256` es OBLIGATORIO: el loader rechaza cualquier archivo del catálogo sin él
# y verifica la integridad tras descargar (re-descarga si no casa). Esto ancla la
# integridad aunque el upstream sea una rama mutable (p. ej. Silero en `master`).
# Todos los modelos son no-gated y de licencia permisiva; los .onnx son 16 kHz.

# Modelo ASR principal (Parakeet TDT 0.6B v3, export ONNX int8, 26 idiomas).
# Cuatro archivos: preprocesador nemo128 + encoder + decoder_joint + vocabulario.
# El loader (rosetta-asr) prefiere la variante .int8.* que registramos aquí.
