# Configuración de cargo-deny (https://embarkstudios.github.io/cargo-deny/).
#
# Cubre higiene de dependencias: vulnerabilidades (RustSec, sustituye a
# cargo-audit), licencias y fuentes. La regla dura "sin C en Windows" se blinda
# aparte con `cargo xtask check-no-c` (grafo por-target), porque cargo-deny opera
# sobre el grafo completo —todas las features/plataformas— donde aparecen crates
# de C (cc, openssl-sys, ...) que nunca se compilan en Windows.

[graph]
# Plataformas que nos importan; acota el grafo a builds reales.
targets = [
  "x86_64-pc-windows-msvc",
  "aarch64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "aarch64-apple-darwin",
]

[advisories]
version = 2
# Las vulnerabilidades se deniegan por defecto. Limita el ruido de "unmaintained"
# a lo que afecte al workspace (no a transitivas profundas que no compilamos).
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
# Allowlist permisiva derivada del conjunto real de licencias del árbol.
# Incluye MPL-2.0 (option-ext, vía directories) y CDLA-Permissive-2.0, ambas
# aceptables (copyleft débil a nivel de archivo / datos permisivos).
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Unicode-3.0",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Zlib",
  "0BSD",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  "Unlicense",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "allow"
# Ofensores concretos que compilan C/C++ y que el proyecto nunca debe arrastrar.
# No se listan cc/bindgen/openssl-sys: aparecen en el grafo de otras plataformas
# o features (no se compilan en Windows) y darían falso positivo aquí. El guard
# real del invariante sin-C es `cargo xtask check-no-c`.
deny = [
  { name = "cmake" },
  { name = "bzip2-sys" },
  { name = "knf-rs" },
  { name = "openblas-src" },
  { name = "openblas-build" },
  { name = "hdf5-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
